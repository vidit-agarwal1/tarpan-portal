
<!DOCTYPE html>

<html>
<head>
    <title>Admission Applications</title>
</head>
<body>

<h1>Admission Applications</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for application in applications %}

<tr>

<td>
    <a href="{% url 'beneficiary_detail' application.id %}">
        {{ application.name }}
    </a>
</td>

<td>{{ application.status }}</td>

<td>
    <a href="{% url 'verify_application' application.id %}">
        Verify
    </a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
