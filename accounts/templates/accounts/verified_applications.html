<!DOCTYPE html>

<html>
<head>
    <title>Verified Applications</title>
</head>
<body>

<h1>Verified Applications</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for application in applications %}

<tr>

```
<td>
    <a href="{% url 'beneficiary_detail' application.id %}">
        {{ application.name }}
    </a>
</td>

<td>{{ application.status }}</td>

<td>
    <a href="{% url 'enroll_beneficiary' application.id %}">
        Enroll
    </a>
</td>
```

</tr>

{% endfor %}

</table>

</body>
</html>
